<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- 网格装饰 -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(74,158,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="rgba(74,158,255,0.08)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <!-- 装饰圆 -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="rgba(74,158,255,0.12)" stroke-width="1"/>
  <circle cx="400" cy="200" r="120" fill="none" stroke="rgba(74,158,255,0.06)" stroke-width="1"/>
  <!-- 路径箭头图标 -->
  <polygon points="360,200 400,170 440,200 420,200 420,230 380,230 380,200" fill="rgba(74,158,255,0.3)"/>
  <!-- 文字 -->
  <text x="400" y="320" text-anchor="middle" fill="rgba(200,210,220,0.6)" font-family="system-ui" font-size="18" font-weight="600" letter-spacing="4">关卡设计 · 玩家引导</text>
  <!-- 底部装饰线 -->
  <rect x="320" y="340" width="160" height="2" fill="url(#accent)" rx="1"/>
</svg>
