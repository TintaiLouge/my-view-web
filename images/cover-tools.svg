<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2040"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- 网格 -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(74,158,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="400" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="400" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="400" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <line x1="700" y1="0" x2="700" y2="400" stroke="rgba(74,158,255,0.05)" stroke-width="1"/>
  <!-- 方块工具图标 -->
  <rect x="350" y="160" width="100" height="70" fill="none" stroke="rgba(74,158,255,0.25)" stroke-width="2" rx="2"/>
  <rect x="360" y="170" width="20" height="20" fill="rgba(74,158,255,0.15)" rx="1"/>
  <rect x="385" y="170" width="55" height="10" fill="rgba(74,158,255,0.1)" rx="1"/>
  <rect x="385" y="185" width="40" height="10" fill="rgba(74,158,255,0.08)" rx="1"/>
  <rect x="385" y="200" width="45" height="10" fill="rgba(74,158,255,0.08)" rx="1"/>
  <!-- 文字 -->
  <text x="400" y="320" text-anchor="middle" fill="rgba(200,210,220,0.6)" font-family="system-ui" font-size="18" font-weight="600" letter-spacing="4">策划工具箱 · 效率工具</text>
  <rect x="320" y="340" width="160" height="2" fill="url(#accent2)" rx="1"/>
</svg>
