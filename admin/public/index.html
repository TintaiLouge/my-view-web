<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JINGYU · Blog Admin</title>
<style>
  :root {
    --bg: #0a0e17;
    --panel: #111827;
    --border: rgba(255,255,255,0.06);
    --accent: #6ea8fe;
    --text: #e0e5ec;
    --dim: #6b7280;
    --green: #34d399;
    --red: #f87171;
    --radius: 6px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: "PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

  /* 侧边栏 */
  .sidebar { width:220px; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:20px 0; flex-shrink:0; }
  .sidebar .logo { padding:0 20px 24px; font-size:1.3rem; font-weight:900; letter-spacing:3px; color:#fff; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .sidebar .logo span { font-size:0.6rem; color:var(--dim); letter-spacing:1px; display:block; margin-top:2px; }
  .nav-item { padding:10px 20px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:0.88rem; color:var(--dim); transition:all 0.2s; border-left:2px solid transparent; letter-spacing:0.5px; }
  .nav-item:hover { color:var(--text); background:rgba(255,255,255,0.02); }
  .nav-item.active { color:var(--accent); background:rgba(110,168,254,0.06); border-left-color:var(--accent); }
  .nav-item .icon { width:20px; text-align:center; font-size:1rem; }
  .sidebar .footer { margin-top:auto; padding:16px 20px; font-size:0.7rem; color:var(--dim); border-top:1px solid var(--border); }

  /* 主区 */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .toolbar { height:52px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; gap:12px; flex-shrink:0; }
  .toolbar h2 { font-size:1rem; font-weight:700; letter-spacing:1px; }
  .toolbar .actions { margin-left:auto; display:flex; gap:8px; }
  .content { flex:1; overflow-y:auto; padding:24px; }

  /* 按钮 */
  .btn { padding:7px 18px; border-radius:var(--radius); border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); cursor:pointer; font-size:0.8rem; font-weight:600; letter-spacing:0.5px; transition:all 0.2s; white-space:nowrap; }
  .btn:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); }
  .btn.primary { background:rgba(110,168,254,0.15); border-color:rgba(110,168,254,0.3); color:var(--accent); }
  .btn.primary:hover { background:rgba(110,168,254,0.25); }
  .btn.danger { background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.2); color:var(--red); }
  .btn.danger:hover { background:rgba(248,113,113,0.2); }
  .btn.green { background:rgba(52,211,153,0.1); border-color:rgba(52,211,153,0.2); color:var(--green); }
  .btn.sm { padding:4px 10px; font-size:0.72rem; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* 输入框 */
  input, textarea, select { background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); padding:8px 12px; font-size:0.85rem; font-family:inherit; outline:none; transition:border-color 0.2s; width:100%; }
  input:focus, textarea:focus, select:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:100px; }

  /* 卡片 */
  .card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; }
  .card-header { font-weight:700; font-size:0.9rem; margin-bottom:12px; letter-spacing:0.5px; }

  /* 文章列表 */
  .post-list {}
  .post-item { display:flex; align-items:center; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; cursor:pointer; transition:all 0.2s; gap:12px; }
  .post-item:hover { border-color:rgba(255,255,255,0.15); background:rgba(255,255,255,0.02); }
  .post-item .post-info { flex:1; min-width:0; }
  .post-item .post-title { font-weight:600; font-size:0.88rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .post-item .post-meta { font-size:0.72rem; color:var(--dim); margin-top:3px; }
  .post-actions { display:flex; gap:6px; flex-shrink:0; }

  /* 图片网格 */
  .img-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px; }
  .img-card { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:all 0.2s; }
  .img-card:hover { border-color:rgba(255,255,255,0.2); }
  .img-card .preview { width:100%; aspect-ratio:16/10; object-fit:cover; background:rgba(0,0,0,0.3); }
  .img-card .info { padding:8px 10px; font-size:0.7rem; }
  .img-card .info .name { color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .img-card .info .size { color:var(--dim); margin-top:2px; }

  /* 编辑区 */
  .editor-layout { display:flex; gap:16px; }
  .editor-left { flex:1; min-width:0; }
  .editor-right { width:360px; flex-shrink:0; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:0.78rem; color:var(--dim); margin-bottom:4px; font-weight:600; letter-spacing:0.5px; }
  .preview-pane { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; min-height:200px; font-size:0.85rem; line-height:1.7; overflow-y:auto; max-height:600px; }
  .preview-pane h1,.preview-pane h2,.preview-pane h3 { color:#fff; }
  .preview-pane p { color:#ccc; }
  .preview-pane code { background:rgba(110,168,254,0.15); color:var(--accent); padding:2px 6px; border-radius:3px; }
  .preview-pane pre { background:rgba(0,0,0,0.4); padding:12px; border-radius:var(--radius); overflow-x:auto; }
  .preview-pane blockquote { border-left:3px solid var(--accent); padding-left:12px; color:#999; }
  .preview-pane table { border-collapse:collapse; width:100%; }
  .preview-pane th,.preview-pane td { border:1px solid var(--border); padding:6px 10px; text-align:left; font-size:0.8rem; }

  /* 日志 */
  .log-area { background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:var(--radius); padding:16px; font-family:monospace; font-size:0.78rem; color:var(--dim); max-height:300px; overflow-y:auto; white-space:pre-wrap; line-height:1.5; }

  /* Toast */
  .toast { position:fixed; top:20px; right:20px; padding:10px 20px; border-radius:var(--radius); font-size:0.82rem; font-weight:600; z-index:9999; animation:slideIn 0.3s ease; }
  .toast.success { background:rgba(52,211,153,0.15); border:1px solid rgba(52,211,153,0.3); color:var(--green); }
  .toast.error { background:rgba(248,113,113,0.15); border:1px solid rgba(248,113,113,0.3); color:var(--red); }
  @keyframes slideIn { from { transform:translateX(100px); opacity:0; } to { transform:translateX(0); opacity:1; } }

  /* 上传区 */
  .drop-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:40px; text-align:center; cursor:pointer; transition:all 0.3s; }
  .drop-zone:hover,.drop-zone.dragover { border-color:var(--accent); background:rgba(110,168,254,0.04); }
  .drop-zone p { color:var(--dim); font-size:0.85rem; }

  /* CDN 复制 */
  .cdn-bar { display:flex; gap:8px; align-items:center; }
  .cdn-bar input { font-family:monospace; font-size:0.72rem; }

  /* 响应式 */
  @media (max-width:900px) {
    .sidebar { width:60px; }
    .sidebar .logo { font-size:0; padding:20px 0; text-align:center; }
    .nav-item span:not(.icon) { display:none; }
    .editor-layout { flex-direction:column; }
    .editor-right { width:100%; }
  }
</style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="logo">JINGYU<span>Admin Panel</span></div>
  <nav>
    <div class="nav-item active" data-tab="posts"><span class="icon">📝</span><span>文章管理</span></div>
    <div class="nav-item" data-tab="images"><span class="icon">🖼️</span><span>图床管理</span></div>
    <div class="nav-item" data-tab="config"><span class="icon">⚙️</span><span>站点配置</span></div>
    <div class="nav-item" data-tab="deploy"><span class="icon">🚀</span><span>部署发布</span></div>
  </nav>
  <div class="footer">v1.0 · Local Admin</div>
</aside>

<!-- 主区 -->
<main class="main">
  <div class="toolbar" id="toolbar">
    <h2 id="tab-title">文章管理</h2>
    <div class="actions" id="toolbar-actions"></div>
  </div>
  <div class="content" id="content"></div>
</main>

<!-- Toast -->
<div id="toast-container"></div>

<script>
// ── 鉴权 ─────────────────────────────────
const AUTH_KEY = 'jingyu_admin_token';

function getToken() { return sessionStorage.getItem(AUTH_KEY); }
function setToken(t) { sessionStorage.setItem(AUTH_KEY, t); }

// 检查登录状态
if (!getToken()) {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg);">
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:48px 40px;width:380px;text-align:center;">
        <div style="font-size:2rem;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:8px;">JINGYU</div>
        <div style="color:var(--dim);font-size:0.85rem;margin-bottom:28px;">Admin Panel</div>
        <input id="pwd-input" type="password" placeholder="请输入管理密码" style="text-align:center;font-size:0.95rem;padding:12px;margin-bottom:8px;" onkeydown="if(event.key==='Enter')doLogin()">
        <p style="color:var(--dim);font-size:0.68rem;margin-bottom:12px;">💡 密码提示：l9</p>
        <p style="color:var(--red);font-size:0.7rem;margin-bottom:8px;background:rgba(248,113,113,0.08);padding:8px 12px;border-radius:4px;text-align:left;line-height:1.6;">
          ⚠️ 首次使用或换电脑？<br>在项目根目录打开终端，复制运行：<br>
          <code style="background:rgba(0,0,0,0.4);padding:4px 8px;border-radius:3px;display:block;margin-top:4px;font-size:0.72rem;color:#fbbf24;word-break:break-all;">echo ***REMOVED*** > admin\.env</code>
        </p>
        <button class="btn primary" style="width:100%;padding:12px;font-size:0.9rem;" onclick="doLogin()">🔑 进入管理后台</button>
        <p id="login-err" style="color:var(--red);font-size:0.78rem;margin-top:12px;display:none;"></p>
      </div>
    </div>
  `;
  window.doLogin = async function() {
    const pwd = document.getElementById('pwd-input').value;
    const errEl = document.getElementById('login-err');
    try {
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:pwd})
      });
      const data = await res.json();
      if (data.success) {
        setToken(data.token);
        location.reload();
      } else {
        errEl.textContent = '密码错误';
        errEl.style.display = 'block';
      }
    } catch(e) {
      errEl.textContent = '连接失败，请确认服务器已启动';
      errEl.style.display = 'block';
    }
  };
  throw new Error('Not logged in'); // 阻止后续代码执行
}

// ── 全局状态 ──────────────────────────────
const state = {
  posts: [],
  images: [],
  currentPost: null,
  editing: false,
  deployLog: ''
};


// ── Toast ─────────────────────────────────
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── API ───────────────────────────────────
function authHeaders() {
  return { 'Content-Type':'application/json', 'X-Auth-Token': getToken() || '' };
}
const api = {
  get: url => fetch(url, { headers:{'X-Auth-Token':getToken()||''} }).then(r => r.json()),
  post: (url, data) => fetch(url, { method:'POST', headers:authHeaders(), body:JSON.stringify(data) }).then(r => r.json()),
  put: (url, data) => fetch(url, { method:'PUT', headers:authHeaders(), body:JSON.stringify(data) }).then(r => r.json()),
  del: url => fetch(url, { method:'DELETE', headers:{'X-Auth-Token':getToken()||''} }).then(r => r.json()),
};

// ── 导航 ──────────────────────────────────
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    const tab = item.dataset.tab;
    document.getElementById('tab-title').textContent = item.textContent.trim();
    document.getElementById('toolbar-actions').innerHTML = '';
    if (tab === 'posts') renderPosts();
    else if (tab === 'images') renderImages();
    else if (tab === 'config') renderConfig();
    else if (tab === 'deploy') renderDeploy();
  });
});

// ── 文章 Tab ──────────────────────────────
async function renderPosts() {
  state.posts = await api.get('/api/posts');
  const el = document.getElementById('content');
  const actions = document.getElementById('toolbar-actions');
  actions.innerHTML = '<button class="btn primary" onclick="newPost()">+ 新建文章</button>';

  if (state.posts.length === 0) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--dim);padding:60px;">还没有文章，点击右上角「新建文章」开始</div>';
    return;
  }

  el.innerHTML = '<div class="post-list">' + state.posts.map(p => `
    <div class="post-item" onclick="editPost('${p.filename}')">
      ${p.cover ? `<img src="${p.cover}" style="width:60px;height:38px;object-fit:cover;border-radius:3px;flex-shrink:0;">` : ''}
      <div class="post-info">
        <div class="post-title">${p.title}</div>
        <div class="post-meta">${p.date?.slice(0,10) || ''} · ${p.categories || '未分类'} · ${(p.tags||[]).join(', ')}</div>
      </div>
      <div class="post-actions">
        <button class="btn sm" onclick="event.stopPropagation();editPost('${p.filename}')">编辑</button>
        <button class="btn sm danger" onclick="event.stopPropagation();deletePost('${p.filename}')">删除</button>
      </div>
    </div>
  `).join('') + '</div>';
}

function newPost() {
  state.editing = false;
  state.currentPost = { title:'', date:'', tags:[], categories:'', description:'', cover:'', content:'' };
  showEditor();
}

function editPost(filename) {
  state.editing = true;
  const p = state.posts.find(p => p.filename === filename);
  if (!p) return;
  state.currentPost = {...p};
  showEditor();
}

async function deletePost(filename) {
  if (!confirm('确认删除「' + filename + '」？此操作不可撤销。')) return;
  await api.del('/api/posts/' + filename);
  toast('文章已删除');
  renderPosts();
}

function showEditor() {
  const p = state.currentPost;
  const el = document.getElementById('content');
  const actions = document.getElementById('toolbar-actions');
  actions.innerHTML = `
    <button class="btn" onclick="renderPosts()">← 返回</button>
    <button class="btn primary" onclick="savePost()">💾 保存</button>
  `;

  el.innerHTML = `
    <div class="editor-layout">
      <div class="editor-left">
        <div class="card">
          <div class="field">
            <label>标题</label>
            <input id="edit-title" value="${esc(p.title)}" placeholder="文章标题">
          </div>
          <div class="field" style="display:flex;gap:12px;">
            <div style="flex:1"><label>日期</label><input id="edit-date" value="${p.date?.slice(0,10) || new Date().toISOString().slice(0,10)}" type="date"></div>
            <div style="flex:1"><label>分类</label><input id="edit-cat" value="${esc(p.categories)}" placeholder="设计思考"></div>
          </div>
          <div class="field">
            <label>标签（逗号分隔）</label>
            <input id="edit-tags" value="${(p.tags||[]).join(', ')}" placeholder="关卡设计, 玩家引导">
          </div>
          <div class="field">
            <label>描述</label>
            <input id="edit-desc" value="${esc(p.description)}" placeholder="文章摘要">
          </div>
          <div class="field">
            <label>封面图路径（可选）</label>
            <input id="edit-cover" value="${esc(p.cover)}" placeholder="/images/cover-xxx.svg">
          </div>
          <div class="field">
            <label>正文（Markdown）</label>
            <textarea id="edit-content" rows="18" oninput="updatePreview()">${esc(p.content)}</textarea>
          </div>
        </div>
      </div>
      <div class="editor-right">
        <div class="card">
          <div class="card-header">📄 预览</div>
          <div class="preview-pane" id="preview">${parseMD(p.content)}</div>
        </div>
      </div>
    </div>
  `;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function updatePreview() {
  const md = document.getElementById('edit-content')?.value || '';
  document.getElementById('preview').innerHTML = parseMD(md);
}

function parseMD(md) {
  // 简易 Markdown → HTML
  let html = (md||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html = html.replace(/^### (.+)/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/^> (.+)/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/^- (.+)/gm, '<li>$1</li>');
  html = html.replace(/^\|(.+)\|/gm, (line) => {
    const cells = line.split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>');
    return cells.length ? '<tr>' + cells.join('') + '</tr>' : line;
  });
  html = html.replace(/(\n\n)/g, '</p><p>');
  html = html.replace(/\n/g, '<br>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p><h/g, '<h').replace(/<\/h(\d)><\/p>/g, '</h$1>');
  return html;
}

async function savePost() {
  const data = {
    title: document.getElementById('edit-title').value,
    date: document.getElementById('edit-date').value + ' ' + new Date().toTimeString().slice(0,8),
    categories: document.getElementById('edit-cat').value,
    tags: document.getElementById('edit-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    description: document.getElementById('edit-desc').value,
    cover: document.getElementById('edit-cover').value,
    content: document.getElementById('edit-content').value
  };

  if (state.editing) {
    await api.put('/api/posts/' + state.currentPost.filename, data);
    toast('文章已更新');
  } else {
    const res = await api.post('/api/posts', data);
    toast(res.message);
  }
  renderPosts();
}

// ── 图片 Tab ──────────────────────────────
async function renderImages() {
  state.images = await api.get('/api/images');
  const el = document.getElementById('content');
  const actions = document.getElementById('toolbar-actions');
  actions.innerHTML = '<button class="btn green" onclick="deploySite()">🚀 部署后 CDN 生效</button>';

  el.innerHTML = `
    <div class="card">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p>📁 拖拽图片到这里上传，或点击选择</p>
        <p style="font-size:0.7rem;margin-top:4px;">支持 JPG/PNG/SVG/GIF · 单文件最大 20MB</p>
      </div>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="uploadImages(this.files)">
    </div>
    ${state.images.length ? `
    <div class="card">
      <div class="card-header">图库（${state.images.length} 张）</div>
      <div class="img-grid">
        ${state.images.map(img => `
          <div class="img-card">
            <img class="preview" src="${img.path}" loading="lazy" onerror="this.src='data:image/svg+xml,${encodeURIComponent('<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22200%22><rect fill=%22%23111%22 width=%22320%22 height=%22200%22/></svg>')}'">
            <div class="info">
              <div class="name" title="${img.name}">${img.name}</div>
              <div class="size">${(img.size/1024).toFixed(1)} KB</div>
              <div style="margin-top:4px;">
                <input value="${img.cdn}" readonly style="font-size:0.62rem;padding:4px 6px;" onclick="this.select();document.execCommand('copy');toast('CDN 链接已复制')" title="点击复制 CDN 链接">
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    ` : '<div class="card" style="text-align:center;color:var(--dim);padding:40px;">还没有上传图片</div>'}
  `;

  // 拖拽上传
  const zone = document.getElementById('dropZone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragover');
      uploadImages(e.dataTransfer.files);
    });
  }
}

async function uploadImages(files) {
  if (!files.length) return;
  const form = new FormData();
  for (const f of files) form.append('images', f);
  const res = await fetch('/api/images/upload', { method:'POST', headers:{'X-Auth-Token':getToken()||''}, body:form });
  const data = await res.json();
  if (data.success) {
    toast(data.message);
    renderImages();
  } else {
    toast('上传失败', 'error');
  }
}

// ── 配置 Tab ──────────────────────────────
async function renderConfig() {
  const cfg = await api.get('/api/config');
  const el = document.getElementById('content');
  const actions = document.getElementById('toolbar-actions');
  actions.innerHTML = '<button class="btn primary" onclick="saveConfig()">💾 保存配置</button>';

  el.innerHTML = `
    <div class="card">
      <div class="card-header">站点设置</div>
      <div class="field"><label>站点标题</label><input id="cfg-title" value="${esc(cfg.site.title)}"></div>
      <div class="field"><label>副标题</label><input id="cfg-subtitle" value="${esc(cfg.site.subtitle)}"></div>
      <div class="field"><label>描述</label><textarea rows="2" id="cfg-desc">${esc(cfg.site.description)}</textarea></div>
      <div class="field"><label>关键词</label><input id="cfg-keywords" value="${esc(cfg.site.keywords)}"></div>
      <div class="field"><label>作者</label><input id="cfg-author" value="${esc(cfg.site.author)}"></div>
      <div class="field"><label>站点 URL</label><input id="cfg-url" value="${esc(cfg.site.url)}"></div>
    </div>
    <div class="card">
      <div class="card-header">主题设置</div>
      <div class="field"><label>默认显示模式</label><select id="cfg-display"><option ${cfg.theme.display_mode==='dark'?'selected':''}>dark</option><option ${cfg.theme.display_mode==='light'?'selected':''}>light</option></select></div>
    </div>
  `;
}

async function saveConfig() {
  const data = {
    site: {
      title: document.getElementById('cfg-title').value,
      subtitle: document.getElementById('cfg-subtitle').value,
      description: document.getElementById('cfg-desc').value,
      keywords: document.getElementById('cfg-keywords').value,
      author: document.getElementById('cfg-author').value,
      url: document.getElementById('cfg-url').value
    },
    theme: {
      display_mode: document.getElementById('cfg-display').value
    }
  };
  await api.put('/api/config', data);
  toast('配置已保存');
}

// ── 部署 Tab ──────────────────────────────
function renderDeploy() {
  const el = document.getElementById('content');
  const actions = document.getElementById('toolbar-actions');
  actions.innerHTML = '<button class="btn primary" onclick="generateSite()">🔧 生成静态文件</button><button class="btn green" onclick="deploySite()">🚀 部署到公网</button>';

  el.innerHTML = `
    <div class="card">
      <div class="card-header">部署状态</div>
      <p style="color:var(--dim);font-size:0.85rem;margin-bottom:12px;">博客地址：<a href="https://tintailouge.github.io/my-view-web/" target="_blank" style="color:var(--accent);">tintailouge.github.io/my-view-web</a></p>
      <p style="color:var(--dim);font-size:0.85rem;">点击「生成静态文件」在本地生成站点，点击「部署到公网」推送到 GitHub Pages。部署后等待 1-2 分钟生效。</p>
    </div>
    <div class="card">
      <div class="card-header">操作日志</div>
      <div class="log-area" id="deploy-log">${state.deployLog || '等待操作...'}</div>
    </div>
  `;
}

async function generateSite() {
  document.getElementById('deploy-log').textContent = '正在生成...';
  await api.post('/api/hexo/generate');
  document.getElementById('deploy-log').textContent = '✅ 静态文件已生成到 public/ 目录';
  toast('生成完成');
}

async function deploySite() {
  const logEl = document.getElementById('deploy-log');
  logEl.textContent = '🔄 清理旧文件 → 生成 → 部署中...\n';
  const res = await api.post('/api/hexo/deploy');
  state.deployLog = res.log || '';
  logEl.textContent = state.deployLog + '\n\n' + (res.success ? '✅ 部署成功！1-2 分钟后刷新查看。' : '❌ 部署失败，请查看日志。');
  toast(res.message, res.success ? 'success' : 'error');
}

// ── 启动 ──────────────────────────────────
renderPosts();
</script>
</body>
</html>
