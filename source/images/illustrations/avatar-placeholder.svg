<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0d1830"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="4" fill="url(#avatarBg)" stroke="rgba(110,168,254,0.2)" stroke-width="1"/>
  <!-- 几何头像 -->
  <circle cx="100" cy="75" r="28" fill="none" stroke="rgba(140,180,255,0.4)" stroke-width="2"/>
  <circle cx="100" cy="75" r="14" fill="rgba(140,180,255,0.06)"/>
  <ellipse cx="100" cy="120" rx="40" ry="30" fill="none" stroke="rgba(140,180,255,0.2)" stroke-width="1.5"/>
  <!-- J 字母 -->
  <text x="100" y="175" text-anchor="middle" fill="rgba(140,180,255,0.35)" font-family="serif" font-size="22" font-weight="bold" letter-spacing="2">JINGYU</text>
</svg>
