<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>稀音可爱捏 · 修复版</title>
    <style>
        /* 全局与卡片容器 */
        body {
            background: #fffef8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            margin: 0;
            padding: 40px 0;
            flex-wrap: wrap;
        }

        .card-container,
        .card {
            width: 120px;
            height: 276px;
            display: inline-block;
            position: relative;
            font-size: 0;
        }

        /* 容器负责缩放与层级，过渡平滑 */
        .card-container {
            margin: 8px;
            transition: transform .4s cubic-bezier(.34, 1.56, .64, 1), z-index .4s ease;
            transform: scale(1);
            z-index: 0;
        }
        .card-container.zoomed {
            transform: scale(1.2);
            z-index: 1;
        }

        .card {
            background: #fff;
            cursor: pointer;
            filter: drop-shadow(0 5px 5px rgba(0, 0, 0, .5));
            transition: all .2s ease;
            /* 内部变换由 JS 控制，不干扰容器缩放 */
        }

        /* 其余样式保持不变 */
        .card-bg {
            position: absolute;
            inset: 0 0 36px;
            background: #fff;
            z-index: 0;
        }

        .image-area {
            position: absolute;
            bottom: 36px;
            left: 0;
            width: 120px;
            height: 240px;
            z-index: 1;
            overflow: hidden;
        }

        .image-main {
            position: absolute;
            z-index: 1;
            transition: left .1s ease-out, top .1s ease-out, filter .1s ease-out;
        }

        .dot-pattern {
            position: absolute;
            right: -50px;
            bottom: -33px;
            width: 200px;
            height: 100px;
            background-image:
                radial-gradient(rgba(0, 0, 0, .2) 6%, transparent 7%),
                radial-gradient(rgba(0, 0, 0, .2) 12%, transparent 13%),
                radial-gradient(rgba(0, 0, 0, .2) 16%, transparent 17%),
                radial-gradient(rgba(0, 0, 0, .2) 20%, transparent 21%),
                radial-gradient(rgba(0, 0, 0, .2) 25%, transparent 26%),
                radial-gradient(rgba(0, 0, 0, .2) 26%, transparent 27%),
                radial-gradient(rgba(0, 0, 0, .2) 30%, transparent 31%),
                radial-gradient(rgba(0, 0, 0, .2) 32%, transparent 33%),
                radial-gradient(rgba(0, 0, 0, .2) 35%, transparent 36%),
                radial-gradient(rgba(0, 0, 0, .2) 32%, transparent 33%),
                radial-gradient(rgba(0, 0, 0, .2) 35%, transparent 36%),
                radial-gradient(rgba(0, 0, 0, .2) 32%, transparent 33%),
                radial-gradient(rgba(0, 0, 0, .2) 35%, transparent 36%),
                radial-gradient(rgba(0, 0, 0, .2) 32%, transparent 33%),
                radial-gradient(rgba(0, 0, 0, .2) 35%, transparent 36%),
                radial-gradient(rgba(0, 0, 0, .2) 32%, transparent 33%);
            background-size: 10px 10px;
            background-position:
                0 0, 5px 5px,
                0 10px, 5px 15px,
                0 20px, 5px 25px,
                0 30px, 5px 35px,
                0 40px, 5px 45px,
                0 50px, 5px 55px,
                0 60px, 5px 65px,
                0 70px, 5px 75px,
                0 80px, 5px 85px,
                0 90px, 5px 95px,
                0 100px, 5px 105px;
            background-repeat: repeat-x;
            transform: rotate(-15deg);
            z-index: 0;
        }

        .badge,
        .badge-shadow {
            position: absolute;
            top: 5px;
            right: -7px;
            height: 20px;
        }

        .badge {
            width: 66px;
            background: #0224ff;
            color: #fff;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
            box-sizing: border-box;
            z-index: 2;
        }

        .badge-shadow {
            width: 30px;
            background: #1f1f8a;
            transform: rotate(-45deg);
            transform-origin: bottom right;
            z-index: -1;
        }

        .title,
        .subtitle {
            position: absolute;
            left: 4px;
            font-weight: bold;
            line-height: 12px;
        }

        .title {
            top: 244px;
            color: #5b5b5b;
            font-size: 13px;
        }

        .subtitle {
            bottom: 4px;
            color: #9d9d9d;
            font-size: 16px;
            white-space: nowrap;
            transform: scale(.5);
            transform-origin: left;
        }

        .overlay-area {
            position: absolute;
            top: 0;
            width: 120px;
            height: 240px;
            overflow: hidden;
            z-index: 0;
            transition: all .4s ease;
            transform-origin: left top;
        }

        .overlay-img {
            filter: invert();
            position: relative;
            transition: left .1s ease-out, top .1s ease-out;
        }

        .brand-logo {
            position: absolute;
            top: 8px;
            left: -16px;
            width: 100px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card" style="transform: perspective(500px) scale(1); box-shadow: rgba(0, 0, 0, 0.2) 0 0 0 0;">
            <div class="card-bg"></div>
            <div class="image-area">
                <div class="dot-pattern"></div>
            </div>
            <div class="image-area" style="overflow: inherit;">
                <div class="image-main" style="left: 0; top: 0; filter: none;">
                    <img loading="lazy" src="https://media.prts.wiki/3/3f/%E5%8D%8A%E8%BA%AB%E5%83%8F_%E7%A8%80%E9%9F%B3_skin2.png" width="120">
                </div>
            </div>
            <div class="overlay-area" style="transform: translateZ(0) scale(1);">
                <div class="overlay-img">
                    <div class="brand-logo"><img src="https://media.prts.wiki/5/5d/Skin_brand_%E7%94%9F%E5%91%BD%E4%B9%8B%E5%9C%B0.png" width="100%"></div>
                </div>
            </div>
            <div class="badge">赛季服饰</div>
            <div class="badge-shadow"></div>
            <div class="title">新地形</div>
            <div class="subtitle">VITAFIELD</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js">
    </script>
    <script>
        $(function() {
            // 旋转限制函数
            const rotate = (cursorPosition, centerPosition, threshold = 20) => {
                const delta = cursorPosition - centerPosition;
                return delta >= 0 ?
                    (delta >= threshold ? threshold : delta) :
                    (delta <= -threshold ? -threshold : delta);
            };

            const brightness = (cursorPositionY, centerPositionY, strength = 20) =>
                1 - rotate(cursorPositionY, centerPositionY) / strength * 0.05;

            const cardData = new Map();

            // 初始化卡片中心点
            $(window).resize(() => {
                $('.card').each(function() {
                    const rect = this.getBoundingClientRect();
                    cardData.set(this, {
                        centerX: rect.left + rect.width / 2,
                        centerY: rect.top + rect.height / 2
                    });
                });
            }).trigger('resize');

            // ----- 容器悬停：使用 zoomed 类，过渡平滑，无抖动 -----
            $('.card-container').hover(
                function() {
                    $(this).addClass('zoomed');
                },
                function() {
                    $(this).removeClass('zoomed');
                }
            );

            // ----- 卡片内部 3D 追踪与视差 -----
            $('.card').hover(
                function() {
                    // 进入时更新中心点（防止窗口改变）
                    const rect = this.getBoundingClientRect();
                    cardData.set(this, {
                        centerX: rect.left + rect.width / 2,
                        centerY: rect.top + rect.height / 2
                    });
                    // 放大 overlay 区域（让品牌标志显现）
                    $(this).find('.overlay-area').css({
                        overflow: 'inherit',
                        left: '-20px',
                        top: '-30px',
                        transform: 'scale(0.7)'
                    });
                },
                function() {
                    // 离开时复位所有变换
                    const $this = $(this);
                    $this.css({
                        transform: 'perspective(500px) scale(1)',
                        filter: 'brightness(1) drop-shadow(0 5px 5px rgba(0,0,0,.5))',
                        boxShadow: '0 0 0 0 rgba(0, 0, 0, 0.2)'
                    }).find('.image-main').css({ left: '0', top: '0', filter: 'none' });

                    $this.find('.overlay-area').css({
                        left: '0',
                        top: '0',
                        filter: 'none',
                        transform: 'translateZ(0) scale(1)',
                        overflow: 'hidden'
                    });

                    $this.find('.overlay-img').css({ left: '0', top: '0' });
                }
            ).mousemove(function(event) {
                const { centerX, centerY } = cardData.get(this) || {};
                // 防止未定义
                if (centerX === undefined) return;

                const calcX = rotate(event.clientX, centerX);
                const calcY = rotate(event.clientY, centerY);
                const calcX2 = event.clientX - centerX;
                const calcY2 = event.clientY - centerY;
                const $this = $(this);

                // 3D 旋转与阴影
                $this.css({
                    transform: `translateZ(0) perspective(1000px) rotateY(${calcX}deg) rotateX(${-calcY / 1.5}deg)`,
                    filter: `brightness(${brightness(event.clientY, centerY)})`,
                    boxShadow: `${-calcX}px ${-calcY}px 10px 0 rgba(0, 0, 20, 0.25)`
                });

                // 视差位移
                $this.find('.overlay-img').css({ left: `${calcX2 / 10}px`, top: `${calcY2 / 15}px` });
                $this.find('.overlay-area').css('filter', `drop-shadow(${-calcX / 7}px ${-calcY / 7}px 0 white)`);
                $this.find('.image-main').css({
                    left: `${calcX2 / 8}px`,
                    top: `${calcY2 / 13}px`,
                    filter: `drop-shadow(${-calcX / 2}px ${-calcY / 2}px 5px rgba(0, 0, 20, 0.2))`
                });
            });
        });
    </script>
</body>
</html>
